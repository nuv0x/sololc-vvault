name: Publish to PyPI

on:
  release:
    types: [published] # 当在 GitHub 创建 Release 时触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    environment:
      name: pypi
      url: https://pypi.org/p/sololc-vvault

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true 

    - name: Build distribution packages
      run: uv build

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1